name: E2E Automation Testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './chest-xray-frontend/package-lock.json'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn selenium pandas openpyxl webdriver-manager pillow python-multipart

    - name: Start Mock Backend Server
      run: |
        python mock_backend.py &
        echo "Waiting for mock backend to spin up on port 8000..."
        for i in {1..10}; do
          curl -s http://localhost:8000/ && break
          echo "Retrying backend connection..."
          sleep 2
        done
      working-directory: ./chest-xray-frontend

    - name: Install Node dependencies
      run: npm install
      working-directory: ./chest-xray-frontend

    - name: Build React application
      run: npm run build
      working-directory: ./chest-xray-frontend

    - name: Start Vite Preview Server
      run: |
        npm run preview -- --port 3000 --host &
        echo "Waiting for Vite preview server to spin up on port 3000..."
        npx wait-on http://localhost:3000 --timeout 45000
      working-directory: ./chest-xray-frontend

    - name: Run Selenium E2E Tests
      run: python selenium_e2e_tests.py
      working-directory: ./chest-xray-frontend

    - name: Run Appium E2E Tests
      run: python appium_e2e_tests.py
      working-directory: ./chest-xray-frontend

    - name: Generate Backend Report
      run: python generate_backend_report.py
      working-directory: ./chest-xray-frontend

    - name: Convert Reports to HTML Dashboard and Job Summary
      if: always()
      run: python convert_reports_to_html.py
      working-directory: ./chest-xray-frontend

    - name: Upload Test Reports Excel Sheets & HTML Dashboard
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: e2e-test-report
        path: |
          ./chest-xray-frontend/Test_Report.xlsx
          ./chest-xray-frontend/Backend_Test_Report.xlsx
          ./chest-xray-frontend/App_Test_Report.xlsx
          ./chest-xray-frontend/Test_Report.html
        if-no-files-found: error
        retention-days: 14
